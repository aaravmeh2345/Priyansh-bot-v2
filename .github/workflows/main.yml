name: Priyansh Bot Scheduled

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante mein automatic run hoga
  workflow_dispatch: # Manual button ke liye

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # Ek waqt par sirf ek hi instance chalne dene ke liye (Double reply fix)
    concurrency:
      group: fb-bot-group
      cancel-in-progress: true 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          cache: 'npm'

      - name: Clean Install
        run: |
          npm install --force

      - name: Start Bot
        run: |
          # Pehle check karega Priyansh.js, phir index.js
          node Priyansh.js || node index.js
          
