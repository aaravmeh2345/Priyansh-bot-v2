name: Priyansh Bot Fix

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          cache: 'npm'

      - name: Force Install Dependencies
        run: |
          npm install --production --force

      - name: Start Priyansh Bot
        run: |
          node Priyansh.js || node index.js
        env:
          NODE_ENV: production
          
